<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 针对所有元素开启 border-box，防止边框撑大容器，对齐 100% 还原极其重要 */
        *, *::before, *::after {
            box-sizing: border-box;
        }
    </style>
</head>
<body class="min-h-screen bg-[#0d0d0d] text-white overflow-x-hidden relative"
      style="background-image: linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px); background-size: 40px 40px;">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[1000px] h-[600px] bg-emerald-500/5 blur-[120px] pointer-events-none rounded-full z-0"></div>

    <header class="fixed top-0 left-0 right-0 z-50 w-full bg-[#0d0d0d]/40 backdrop-blur-md border-b border-white/[0.04] px-6 py-4 flex justify-center">
        <div class="w-full max-w-[1600px] flex justify-between items-center" style="min-width: calc(100vw - 200px);">
            
            <nav class="flex items-center gap-1 bg-[#121212]/80 border border-white/[0.05] p-1.5 rounded-full shadow-lg">
                <a href="#" class="group flex items-center gap-2 px-5 py-2 rounded-full text-xs font-medium tracking-wide bg-neutral-800 text-white shadow-md transition-all duration-300">
                    <span class="text-emerald-400"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg></span>
                    <span>首页</span>
                </a>
                <a href="#game-dev" class="group flex items-center gap-2 px-5 py-2 rounded-full text-xs font-medium tracking-wide text-neutral-400 hover:text-neutral-200 hover:bg-white/[0.02] transition-all duration-300">
                    <span class="text-neutral-500 group-hover:text-neutral-300 transition-transform duration-300 group-hover:scale-110"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 0 1 3 3h-15a3 3 0 0 1 3-3m9 0v-3.375c0-.621-.504-1.125-1.125-1.125h-2.25c-.621 0-1.125.504-1.125 1.125v3.375m9 0h1.5A2.25 2.25 0 0 0 21 16.5v-5.25a2.25 2.25 0 0 0-2.25-2.25h-13.5A2.25 2.25 0 0 0 3 11.25v5.25a2.25 2.25 0 0 0 2.25 2.25h1.5m2.25-4.5h.008v.008H9v-.008Zm2.25 0h.008v.008H11.25v-.008Zm2.25 0h.008v.008H13.5v-.008Zm2.25 0h.008v.008H15.75v-.008Z" /></svg></span>
                    <span>游戏开发</span>
                </a>
                <a href="#story" class="group flex items-center gap-2 px-5 py-2 rounded-full text-xs font-medium tracking-wide text-neutral-400 hover:text-neutral-200 hover:bg-white/[0.02] transition-all duration-300">
                    <span class="text-neutral-500 group-hover:text-neutral-300 transition-transform duration-300 group-hover:scale-110"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-16.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-16.25v14.25" /></svg></span>
                    <span>我的故事</span>
                </a>
                <a href="#cases" class="group flex items-center gap-2 px-5 py-2 rounded-full text-xs font-medium tracking-wide text-neutral-400 hover:text-neutral-200 hover:bg-white/[0.02] transition-all duration-300">
                    <span class="text-neutral-500 group-hover:text-neutral-300 transition-transform duration-300 group-hover:scale-110"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 0 1-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 0 0 6.16-12.12A14.98 14.98 0 0 0 9.631 8.41m5.96 5.96a14.926 14.926 0 0 1-5.841 2.58m-.119-8.54a6 6 0 0 0-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 0 0-2.58 5.84m2.699-2.7c-.103.103-.214.2-.332.291m-.514-.514a6.015 6.015 0 0 1 .514.514L8.43 14.37M21 3h-.008v.008H21V3Zm-.375.375h.008v.008h-.008v-.008Z" /></svg></span>
                    <span>案例分享</span>
                </a>
            </nav>

            <nav class="flex items-center gap-1 bg-[#121212]/80 border border-white/[0.05] p-1.5 rounded-full shadow-lg">
                <a href="#about" class="group flex items-center gap-2 px-5 py-2 rounded-full text-xs font-medium tracking-wide text-neutral-400 hover:text-neutral-200 hover:bg-white/[0.02] transition-all duration-300">
                    <span class="text-neutral-500 group-hover:text-neutral-300 transition-transform duration-300 group-hover:scale-110"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg></span>
                    <span>关于我</span>
                </a>
                <a href="#contact" class="group flex items-center gap-2 px-5 py-2 rounded-full text-xs font-medium tracking-wide text-neutral-400 hover:text-neutral-200 hover:bg-white/[0.02] transition-all duration-300">
                    <span class="text-neutral-500 group-hover:text-neutral-300 transition-transform duration-300 group-hover:scale-110"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" /></svg></span>
                    <span>联系</span>
                </a>
            </nav>

        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6 pt-32 pb-24 relative z-10">
        <div class="h-[60vh] rounded-3xl bg-neutral-950/60 border border-white/[0.03] flex flex-col items-center justify-center text-center backdrop-blur-sm p-8">
            <h1 class="text-2xl font-bold tracking-tight text-white mb-2">纯原生静态网站骨架已就绪</h1>
            <p class="text-neutral-500 text-sm max-w-md font-mono">
                当前最大视宽已锁定 1600px。请去 Figma 设计你的 Bento 格子铺，设计完成后把样式丢给 AI 进行 100% 还原。
            </p>
        </div>
    </main>

</body>
</html>
